# L7 load balancer for the four medplum-server replicas.
#
# Why this exists: Medplum's server is a plain Express app (no cluster mode),
# so a single container saturates at one CPU. Their documented deployment
# pattern is N replicas behind a load balancer. This file is the LB.
#
# Bound on port 8103 externally — the same port a single medplum-server would
# have bound — so every client (bootstrap_medplum.py, loader, workloads)
# continues to talk to localhost:8103 without any change to servers.yaml.

worker_processes auto;
events { worker_connections 4096; }

http {
  # least_conn sends new requests to the replica with the fewest in-flight
  # connections. For bundle ingest — where per-bundle latency varies from
  # ms to tens of seconds — this balances better than round-robin.
  upstream medplum_pool {
    least_conn;
    server medplum-1:8103 max_fails=0;
    server medplum-2:8103 max_fails=0;
    server medplum-3:8103 max_fails=0;
    server medplum-4:8103 max_fails=0;
    keepalive 64;
  }

  server {
    listen 8103;
    # Synthea's chronic-patient bundles hit ~70 MiB. Medplum's own config
    # allows 100 MiB bodies, so the LB cannot be the gate.
    client_max_body_size 200m;
    # Medplum bundle inserts can run for many seconds at large N. Match the
    # loader's 1500s per-request timeout so the LB doesn't cut off legitimate
    # slow inserts and turn them into 504s that look like server failures.
    proxy_read_timeout 1500s;
    proxy_send_timeout 1500s;
    proxy_connect_timeout 10s;

    location / {
      proxy_pass http://medplum_pool;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
