# L7 load balancer for the twelve medplum-server replicas.
#
# Why this exists: Medplum's server is a plain Express app (no cluster mode),
# so a single container saturates at one CPU. Their documented deployment
# pattern is N replicas behind a load balancer. This file is the LB.
#
# Replica count was bumped 4 → 12 on 2026-04-28 in response to a fairness
# suggestion from Marat Surmashev (Aidbox): with 4 replicas Medplum's
# server-pool topped out at 4 cores while HAPI/Aidbox use 12 in their single
# multithreaded process. 12 replicas × 1 CPU each lets all 12 cores of the
# budget actually be consumed.
#
# Bound on port 8103 externally — the same port a single medplum-server would
# have bound — so every client (bootstrap_medplum.py, loader, workloads)
# continues to talk to localhost:8103 without any change to servers.yaml.

worker_processes auto;
events {
  # 8192 vs the default-ish 4096: at 64-VU concurrency × 12 upstream replicas
  # the pre-bump worker can plausibly saturate its FD pool during ingest
  # bursts (each k6 connection is bound to one client + one upstream slot).
  # Doubling is cheap on a Ryzen 9950X and removes "did we ever hit the
  # limit?" as a confounder when reading p99.
  worker_connections 8192;
  use epoll;
}

http {
  # least_conn sends new requests to the replica with the fewest in-flight
  # connections. For bundle ingest — where per-bundle latency varies from
  # ms to tens of seconds — this balances better than round-robin.
  #
  # Tuning history: keepalive directives (requests/timeout) and per-upstream
  # max_conns were added 2026-04-30 in response to Marat Surmashev's
  # observation that NGINX defaults can cap horizontal-scale throughput.
  # See plans/marat-from-health-samurai-wondrous-tome.md (Track B) for the
  # decision gate this experiment is measured against.
  upstream medplum_pool {
    least_conn;
    # max_conns caps in-flight requests per upstream replica. Without it, a
    # transiently slow replica can accumulate the full keepalive pool and
    # tank p99 for everyone. 100 in-flight × 12 replicas = 1200 concurrent
    # ceiling, well above the 64-VU workload's natural concurrency.
    server medplum-1:8103  max_fails=0 max_conns=100;
    server medplum-2:8103  max_fails=0 max_conns=100;
    server medplum-3:8103  max_fails=0 max_conns=100;
    server medplum-4:8103  max_fails=0 max_conns=100;
    server medplum-5:8103  max_fails=0 max_conns=100;
    server medplum-6:8103  max_fails=0 max_conns=100;
    server medplum-7:8103  max_fails=0 max_conns=100;
    server medplum-8:8103  max_fails=0 max_conns=100;
    server medplum-9:8103  max_fails=0 max_conns=100;
    server medplum-10:8103 max_fails=0 max_conns=100;
    server medplum-11:8103 max_fails=0 max_conns=100;
    server medplum-12:8103 max_fails=0 max_conns=100;
    keepalive 192;
    # Default keepalive_requests=100 cycles upstream connections too aggressively
    # under sustained CRUD/Search load, forcing TCP handshake overhead onto
    # latency. 500 keeps each warm connection alive across more requests.
    keepalive_requests 500;
    # Default keepalive_timeout=60s drops idle pool connections during the
    # gaps between workload phases. 120s holds them warmer across the whole
    # benchmark cycle.
    keepalive_timeout 120s;
  }

  server {
    listen 8103;
    # Synthea's chronic-patient bundles hit ~70 MiB. Medplum's own config
    # allows 100 MiB bodies, so the LB cannot be the gate.
    client_max_body_size 200m;
    # Medplum bundle inserts can run for many seconds at large N. Match the
    # loader's 1500s per-request timeout so the LB doesn't cut off legitimate
    # slow inserts and turn them into 504s that look like server failures.
    proxy_read_timeout 1500s;
    proxy_send_timeout 1500s;
    proxy_connect_timeout 10s;

    location / {
      proxy_pass http://medplum_pool;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # proxy_buffering off streams responses straight from upstream to
      # client without first buffering the whole body in nginx memory.
      # For ingest's ~70 MiB bundle responses this drops nginx RSS by an
      # order of magnitude and removes a measurable latency floor.
      # Trade-off: a slow client can hold an upstream connection open
      # for the entire transfer, but our k6 generator reads as fast as
      # the network delivers, so this is upside only here.
      proxy_buffering off;
    }
  }
}
