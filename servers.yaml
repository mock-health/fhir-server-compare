# servers.yaml — configuration for each FHIR server compare.py queries.
# Each entry becomes a column in the matrix. Order here controls column order
# in the output table.
#
# Enablement is probe-based: compare.py hits <base_url>/metadata on startup
# and only includes servers that respond 2xx. Bring up whichever servers you
# want via docker-compose.yml; everything else is skipped with a clear log line.
#
# Auth types handled by the shim in compare.py:
#   none               — no Authorization header (HAPI default, MS FHIR dev mode)
#   basic              — HTTP Basic (Aidbox via init-bundle-provisioned client)
#   client_credentials — OAuth2 client_credentials token fetch (Medplum)
#
# Env var interpolation in strings uses ${VAR} (required) or ${VAR:-default}
# (defaulted). Resolved at load time by compare.py.

servers:
  - id: hapi
    label: HAPI
    base_url: ${HAPI_BASE_URL:-http://localhost:8080/fhir}
    # `version`, `image`, `source_url` are publisher-side provenance so the
    # matrix can say exactly what was tested. Refresh `version` with
    # `scripts/fetch_server_versions.py` (pulls latest GitHub release tags).
    # Pinning image tags to sha256 digests is tracked separately (PLAN.md #4).
    version: "8.8.0-1"
    image: hapiproject/hapi:latest
    source_url: https://github.com/hapifhir/hapi-fhir-jpaserver-starter
    auth:
      type: none

  - id: msfhir
    label: MS FHIR
    base_url: ${MSFHIR_BASE_URL:-http://localhost:8081}
    version: "4.0.728"
    image: mcr.microsoft.com/healthcareapis/r4-fhir-server:latest
    source_url: https://github.com/microsoft/fhir-server
    auth:
      type: none
    # Microsoft's FHIR best-practices doc explicitly recommends this for
    # throughput — default processing is sequential within a bundle, which
    # serializes hundreds of SQL INSERTs per patient. Turning on parallel is
    # Microsoft's own tuning guidance, not a workaround.
    # https://learn.microsoft.com/en-us/azure/healthcare-apis/fhir/fhir-best-practices
    extra_headers:
      x-bundle-processing-logic: parallel

  - id: medplum
    label: Medplum
    base_url: ${MEDPLUM_BASE_URL:-http://localhost:8103/fhir/R4}
    version: "5.1.8"
    image: medplum/medplum-server:latest
    source_url: https://github.com/medplum/medplum
    auth:
      type: client_credentials
      token_url: ${MEDPLUM_TOKEN_URL:-http://localhost:8103/oauth2/token}
      client_id: ${MEDPLUM_CLIENT_ID:-}
      client_secret: ${MEDPLUM_CLIENT_SECRET:-}

  - id: aidbox
    label: Aidbox
    base_url: ${AIDBOX_BASE_URL:-http://localhost:8888/fhir}
    # Aidbox is closed-source commercial — no GitHub release feed. Version
    # follows a YYMM convention; `latest` Docker tag currently resolves to
    # the March 2026 release "2603". Refresh by checking
    # https://www.health-samurai.io/docs/aidbox/overview/release-notes.
    version: "2603"
    image: healthsamurai/aidboxone:latest
    source_url: https://www.health-samurai.io/docs/aidbox/overview/release-notes
    auth:
      type: basic
      username: ${AIDBOX_CLIENT_ID:-basic-client}
      password: ${AIDBOX_CLIENT_SECRET:-secret}

  - id: blaze
    label: Blaze
    base_url: ${BLAZE_BASE_URL:-http://localhost:8082/fhir}
    version: "1.6.2"
    image: samply/blaze:latest
    source_url: https://github.com/samply/blaze
    auth:
      type: none

  - id: hfs
    label: HFS
    # Helios FHIR Server — MIT-licensed, Rust-based, Postgres+Elasticsearch
    # split-backend production path. Round 2 spike: Postgres-only for the
    # first 1K to isolate the storage-engine comparison; Elastic added later
    # for the full split-backend story. Internal port 8080 → host 8085.
    # CapabilityStatement is at root /metadata (same pattern as MS FHIR),
    # so the FHIR base URL has no path suffix.
    base_url: ${HFS_BASE_URL:-http://localhost:8085}
    # HFS 0.1.47 + the body-limit fix (HeliosSoftware/hfs#68, merged upstream).
    # We still build locally from ../hfs via hfs-docker/Dockerfile.fork for
    # reproducibility of the exact binary used in this round; once upstream
    # ships a release containing #68 we can swap to the registry image and
    # drop the dockerfile_url. `source_url` points at upstream.
    version: "0.1.47+pr68"
    image: fhir-compare-hfs-fork:0.1.47
    source_url: https://github.com/HeliosSoftware/hfs
    dockerfile_url: https://github.com/mock-health/fhir-server-compare/blob/main/hfs-docker/Dockerfile.fork
    auth:
      type: none

  - id: spark
    label: Spark
    # BSD-3, MongoDB-backed, maintained by Incendi (originally a Firely
    # project). Internal port 80 → host 8084. FHIR base at /fhir.
    base_url: ${SPARK_BASE_URL:-http://localhost:8084/fhir}
    version: "2.4.1-r4"
    image: sparkfhir/spark:r4-latest
    source_url: https://github.com/FirelyTeam/spark
    auth:
      type: none
