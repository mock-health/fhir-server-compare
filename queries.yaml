# Hand-picked FHIR queries that back up claims in the blog post
# "Same FHIR, Different Answers: Comparing 5 FHIR Servers"
#   https://mock.health/blog/fhir-server-compare
#
# Each query is sent verbatim to every server enabled in servers.yaml by
# compare.py. The blog_section field points at the section of the post the
# query backs up. The expected_<server> fields describe what that server
# returns when you run this against the matched dataset described in the
# blog.
#
# The 12 matrix rows in the post:
#   Rows 1–10 are runtime queries in this file.
#   Row 11 (transaction bundle size cap) and row 12 (canonical URL uniqueness
#   enforcement) are observed from load_bundle.py output — they are load-time
#   rejections, not GET queries. See README for how those findings surface.
#
# Additional queries beyond the blog matrix exist here to diversify the
# load-test search workload (Patient-by-gender, Patient-by-name prefixes,
# varied LOINC codes, date ranges). These are not intended as blog rows —
# they exist so the /performance Search cell averages across the search
# shapes real clinical apps use, not one LOINC code. They share the
# "Search behavior diverges in ways you will not notice" blog_section tag
# and carry "?" in every expected_* field until empirically captured.
#
# Expected values for aidbox / medplum / msfhir are marked "?" where they
# have not yet been filled empirically. They are populated by the "Day 5"
# run of the matrix against live servers — DO NOT guess; capture from the
# raw JSON in results/ and fill in.
#
# Schema:
#   name:             short identifier (used as a column header)
#   blog_section:     the post section title this query backs up
#   description:      one-liner shown above the table row
#   method:           GET (default) or POST
#   path:             FHIR path after /fhir/ (e.g. "Patient" or "metadata")
#   params:           map of query parameters
#   headers:          map of extra request headers (merged over auth headers)
#   body:             request body (POST only)
#   loadtest:         "include" (default) or "skip:<reason>". Behavior matrix
#                     (compare.py) runs ALL queries — that's how we document
#                     "what each server supports." The load-test workload
#                     (workload_search.py) only fires queries marked
#                     loadtest=include so the headline ops/s and p99 numbers
#                     measure SPEED of supported queries, not RE-DOCUMENT
#                     known support gaps under load. Drop reasons:
#                       * intentional_4xx — query exists to test error
#                         response semantics; no perf signal at scale.
#                       * unloaded_terminology — operation is implemented
#                         but content (LOINC, SNOMED, US Core) isn't loaded
#                         on any server; 404s don't measure server speed.
#                       * asymmetric_support — some servers implement,
#                         some don't; binary outcome already in matrix; at
#                         load, rejecting servers waste budget on no-op 4xx.
#   matrix:           "include" (default) or "skip:<reason>". Mirror of
#                     loadtest but excludes a query from the behavior matrix
#                     (compare.py) rather than the load workload. Used for
#                     runtime-sampled queries (see below) whose parameter
#                     values are drawn from live corpus at load time and
#                     therefore have no stable expected_* to compare against.
#                     Skip reason so far:
#                       * runtime_sampled — query contains `{{placeholder}}`
#                         refs resolved per-request from a SamplePool;
#                         compare.py has no way to fill them, so skip.
#   sample:           Optional map of `placeholder_name: pool_name`. At load
#                     time, workload_search.py expands `{{placeholder_name}}`
#                     in path + param values by drawing a fresh random value
#                     from the named pool. Pool names are defined in
#                     loadtest/sample_pool.py: patient_id, patient_family,
#                     patient_given, condition_code, procedure_code,
#                     medication_code, practitioner_id, location_id.
#                     Values in pools are pre-formatted as 'system|code'
#                     (tokens) or raw ids (references), ready to drop in.
#   expected_hapi:    what HAPI returns (free text)
#   expected_aidbox:  what Aidbox returns (free text; "?" = not yet observed)
#   expected_medplum: what Medplum returns (free text; "?" = not yet observed)
#   expected_msfhir:  what Microsoft FHIR Server returns (free text; "?" = not yet observed)
#   expected_blaze:   what Blaze returns (free text; "?" = not yet observed)
#   expected_spark:   what Spark returns (free text; "?" = not yet observed)
#   expected_hfs:     what HFS returns (free text; "?" = not yet observed)
#
# Historical note: earlier iterations compared against GCP Healthcare API. GCP
# is no longer in-scope (this repo is OSS-only and locally-reproducible), so
# `expected_gcp` fields have been removed. Some existing `expected_*` strings
# still reference GCP as a historical comparison point; those will be
# rewritten in a later content pass.

queries:
  - name: capability_statement
    blog_section: "Operations support is where the gap is biggest"
    description: Server CapabilityStatement from /metadata. Every server returns a valid CapabilityStatement, but the top-level fields differ.
    path: metadata
    expected_hapi:    "200 — CapabilityStatement with implementation, instantiates, name, software, text"
    expected_aidbox:  "200 — CapabilityStatement with resourceType only (software/version block empty on the community edition)"
    expected_medplum: "200 — CapabilityStatement, Medplum-branded software block ('Medplum Server' 5.1.8)"
    expected_msfhir:  "200 — CapabilityStatement, Microsoft-branded publisher and implementationGuide fields"
    expected_blaze:   "200 — CapabilityStatement, publisher='The Samply Community', includes Apache 2.0 copyright text"
    expected_spark:   "200 — CapabilityStatement v2.4.1 publisher='Incendi', describes itself as 'reference Implementation server built in C# on HL7.Fhir.Core (nuget) by Firely, Incendi and others'"

  - name: observation_search_default
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Search Observation with _count=10 and no _total. HAPI omits Bundle.total by default when the result set is larger than the page; GCP always populates total.
    path: Observation
    params:
      _count: "10"
    expected_hapi:    "200 — Bundle with id and meta.lastUpdated, total=null (HAPI omits total by default; pass _total=accurate to get it)"
    expected_aidbox:  "200 — Bundle.total populated (Aidbox always returns total, like GCP)"
    expected_medplum: "200 — Bundle with total=null, 10 entries (Medplum omits total by default, like HAPI)"
    expected_msfhir:  "200 — Bundle with total=null, matches HAPI + Medplum."
    expected_blaze:   "200 — Bundle.total=185 populated by default (Blaze sides with Aidbox + GCP, not HAPI/Medplum/MS-FHIR)"
    expected_spark:   "200 — Bundle.total=360 populated by default (Spark joins the populate-total camp; the count differs from Blaze's 185 because Spark indexes more resource types per-bundle by default)"

  - name: observation_search_total_accurate
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Same query with _total=accurate. Confirms HAPI omits total only by default, not by capability.
    path: Observation
    params:
      _count: "1"
      _total: accurate
    expected_hapi:    "200 — Bundle.total = (count of observations in your store, e.g. 37)"
    expected_aidbox:  "200 — Bundle.total matches (Aidbox reports total by default anyway; _total=accurate is a no-op)"
    expected_medplum: "200 — Bundle.total = 37 (honors _total=accurate)"
    expected_msfhir:  "200 — Bundle.total = 37 (honors _total=accurate, matching the other servers)"
    expected_blaze:   "200 — Bundle.total = 185 (matches the default-populated value; _total=accurate is a no-op for Blaze)"
    expected_spark:   "200 — Bundle.total = 360 (Spark honors _total=accurate same as default; note Spark returned 2 entries for _count=1 — minor _count handling anomaly worth flagging)"

  - name: q7_error_unsupported_param
    blog_section: "The silent-ignore that will eat your filter"
    description: Sends a deliberately misspelled search parameter. THE most important divergence in the post.
    path: Patient
    loadtest: "skip:intentional_4xx"
    params:
      this-is-not-a-real-param: garbage
      _count: "1"
    expected_hapi:    "400 — OperationOutcome listing every valid Patient search parameter"
    expected_aidbox:  "422 — OperationOutcome 'No search parameter for Patient.this-is-not-a-real-param' (different status than HAPI, same behavior: loud rejection — Aidbox picks 422 Unprocessable Entity, arguably more semantically correct)"
    expected_medplum: "400 — OperationOutcome code=invalid 'Unknown search parameter: this-is-not-a-real-param' (loud rejection, matches HAPI)"
    expected_msfhir:  "200 — Bundle with the FULL UNFILTERED patient list. MS FHIR silently ignores unknown parameters."
    expected_blaze:   "200 — Bundle with FULL UNFILTERED list, 1 entry. Blaze SILENT-IGNORES — joining the dangerous footgun camp."
    expected_spark:   "200 — Bundle with total=270 unfiltered, 2 entries. Spark also SILENT-IGNORES."

  - name: observation_by_code
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Search Observation by LOINC code 8480-6 (systolic blood pressure). The default `code` parameter only matches the top-level Observation.code field, not Observation.component.code. Synthea encodes BP as a panel (85354-9) with systolic in component[0], so this query returns ZERO on every server despite the bundle containing BP data.
    path: Observation
    params:
      code: "http://loinc.org|8480-6"
      _count: "1"
      _total: accurate
    expected_hapi:    "200 — Bundle.total = 0 (no top-level matches; this is correct, BP lives in components)"
    expected_aidbox:  "200 — Bundle.total = 0 (same semantics — `code` excludes component codes)"
    expected_medplum: "200 — Bundle.total = 0 (matches — `code` parameter excludes component codes everywhere)"
    expected_msfhir:  "200 — Bundle.total = 0 (matches the rest — `code` is spec-compliant everywhere)"
    expected_blaze:   "200 — Bundle.total = 0 (matches — base spec behavior consistent)"
    expected_spark:   "200 — Bundle.total = 0 BUT returned 1 entry (Spark anomaly: claims zero total, returns one entry — minor consistency bug)"

  - name: q1_uscore_observation_combo
    blog_section: "Search behavior diverges in ways you will not notice"
    description: The fix — search the same code via the FHIR R4 combo-code parameter (defined in the base spec for Observation), which matches BOTH Observation.code AND Observation.component.code. Returns the BP panels the previous query missed.
    path: Observation
    params:
      combo-code: "http://loinc.org|8480-6"
      _count: "1"
      _total: accurate
    expected_hapi:    "200 — Bundle.total = 3+ (matches the BP panels via component code)"
    expected_aidbox:  "200 — Bundle.total = 3 (matches HAPI — combo-code is a base-spec parameter, universally honored)"
    expected_medplum: "200 — Bundle.total = 3 (matches; combo-code is honored across all 4 self-hosted servers)"
    expected_msfhir:  "200 — Bundle.total = 3 (matches; combo-code is consistently honored across self-hosted servers)"
    expected_blaze:   "200 — Bundle.total = 14 (Blaze matches the BP panels via combo-code; higher count likely from larger Aurelio bundle)"
    expected_spark:   "200 — Bundle.total = 17, 2 entries (Spark also honors combo-code; counts differ across stores due to indexing differences)"

  - name: patient_by_gender
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Patient search by gender. Token match on ~50% of the corpus — exercises large-result handling and pagination. Adds Patient-route coverage to the load mix, which was previously Observation-only.
    path: Patient
    params:
      gender: male
      _count: "5"
      _total: accurate
    expected_hapi:    "?"
    expected_aidbox:  "?"
    expected_medplum: "?"
    expected_msfhir:  "?"
    expected_blaze:   "?"
    expected_spark:   "?"

  - name: patient_by_family_prefix
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Patient search by family name prefix. FHIR default string-search semantics are case-insensitive prefix match; Synthea surnames have digit suffixes (Sporer811, Stoltenberg489), so a single-letter prefix like "S" matches many records at every checkpoint. Exercises the family-name index.
    path: Patient
    params:
      family: S
      _count: "5"
    expected_hapi:    "?"
    expected_aidbox:  "?"
    expected_medplum: "?"
    expected_msfhir:  "?"
    expected_blaze:   "?"
    expected_spark:   "?"

  - name: patient_by_given_prefix
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Patient search by given name prefix. Same shape as family-prefix but indexes the `given` component, which on several servers is stored in a separate column or index from `family`. Exercises that separate path.
    path: Patient
    params:
      given: A
      _count: "5"
    expected_hapi:    "?"
    expected_aidbox:  "?"
    expected_medplum: "?"
    expected_msfhir:  "?"
    expected_blaze:   "?"
    expected_spark:   "?"

  - name: patient_by_gender_family
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Compound Patient search — gender AND family prefix. Tests whether the query planner AND's the predicates efficiently or evaluates one then filters the other in memory. Spark has historically returned odd entry counts on compound queries; note any anomaly in the expected field rather than "fixing" the query.
    path: Patient
    params:
      gender: female
      family: B
      _count: "5"
    expected_hapi:    "?"
    expected_aidbox:  "?"
    expected_medplum: "?"
    expected_msfhir:  "?"
    expected_blaze:   "?"
    expected_spark:   "?"

  - name: observation_by_height
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Observation by LOINC code 8302-2 (Body Height). Synthea seeds this observation on every patient, so the token index returns dense matches at every checkpoint — complements the existing 8480-6 query (which matches zero top-level because BP is in components).
    path: Observation
    params:
      code: "http://loinc.org|8302-2"
      _count: "5"
      _total: accurate
    expected_hapi:    "?"
    expected_aidbox:  "?"
    expected_medplum: "?"
    expected_msfhir:  "?"
    expected_blaze:   "?"
    expected_spark:   "?"

  - name: observation_by_weight
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Observation by LOINC code 29463-7 (Body Weight). Another universally-seeded code — provides a second dense-match token query so observation-by-code is not a statistical sample of one.
    path: Observation
    params:
      code: "http://loinc.org|29463-7"
      _count: "5"
      _total: accurate
    expected_hapi:    "?"
    expected_aidbox:  "?"
    expected_medplum: "?"
    expected_msfhir:  "?"
    expected_blaze:   "?"
    expected_spark:   "?"

  - name: observation_by_pain
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Observation by LOINC code 72514-3 (Pain severity). Not seeded on every patient — sparser token matches. Pairs with the dense height/weight codes to exercise high-selectivity vs low-selectivity index paths.
    path: Observation
    params:
      code: "http://loinc.org|72514-3"
      _count: "5"
      _total: accurate
    expected_hapi:    "?"
    expected_aidbox:  "?"
    expected_medplum: "?"
    expected_msfhir:  "?"
    expected_blaze:   "?"
    expected_spark:   "?"

  - name: observation_recent
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Observation date range (ge2020-01-01). The date-index path is distinct from token and string indexes on every server; heavily used by clinical UIs loading "recent" labs. Open-ended range so result sets track corpus size at each checkpoint.
    path: Observation
    params:
      date: ge2020-01-01
      _count: "5"
    expected_hapi:    "?"
    expected_aidbox:  "?"
    expected_medplum: "?"
    expected_msfhir:  "?"
    expected_blaze:   "?"
    expected_spark:   "?"

  - name: q2_history_type
    blog_section: "Operations support is where the gap is biggest"
    description: Type-level history endpoint (Patient/_history). HAPI exposes it. GCP does not even recognize the URL pattern.
    path: Patient/_history
    loadtest: "skip:asymmetric_support"
    params:
      _count: "1"
    expected_hapi:    "200 — Bundle (history-search type) with the latest patient versions"
    expected_aidbox:  "200 — Bundle of size 1 (Aidbox supports Patient/_history, like HAPI — GCP is the outlier)"
    expected_medplum: "404 — OperationOutcome 'Not found'. Medplum does NOT expose type-level history; the URL is unrouted."
    expected_msfhir:  "200 — Bundle with 1 entry but total=null (MS FHIR supports _history; note total omission on a history bundle is a subtle inconsistency vs HAPI/Aidbox)"
    expected_blaze:   "200 — Bundle of size 1 (Blaze supports type-level history)"
    expected_spark:   "200 — Bundle.total=278, 1 entry (Spark supports _history with full version count visible). Now five-of-seven supporting type-level history (HAPI, Aidbox, MS-FHIR, Blaze, Spark) vs two not (Medplum, GCP)."

  - name: q6_expand_valueset
    blog_section: "Operations support is where the gap is biggest"
    description: $expand on a US Core ValueSet. The terminology operation that drives every clinical autocomplete picker for SNOMED, LOINC, ICD-10.
    path: ValueSet/$expand
    loadtest: "skip:unloaded_terminology"
    params:
      url: "http://hl7.org/fhir/us/core/ValueSet/us-core-condition-code"
      count: "5"
    expected_hapi:    "404 — OperationOutcome: Unknown ValueSet (HAPI knows what $expand is, the test ValueSet is not pre-loaded)"
    expected_aidbox:  "404 — matches HAPI (Aidbox supports $expand but the US Core ValueSet is not pre-loaded)"
    expected_medplum: "400 — OperationOutcome 'ValueSet http://hl7.org/fhir/us/core/ValueSet/us-core-condition-code not found'. Medplum supports $expand but picks 400 (client error) for an unloaded ValueSet."
    expected_msfhir:  "200 — but body is an OperationOutcome with severity=error: 'Operation expand failed: valueset is unknown.' Returning a 200 status for an operation failure is questionable DX."
    expected_blaze:   "400 — Blaze rejects the $expand call with 400 (no terminology loaded); status choice differs from HAPI's 404 for the same condition"
    expected_spark:   "400 — Spark also returns 400 (no terminology loaded). Six servers, four distinct status code choices for 'operation exists but content not loaded': HAPI 404, Aidbox 404, Medplum 400, MS-FHIR 200+OperationOutcome, Blaze 400, Spark 400. GCP rejects the operation itself."

  - name: q6_lookup_loinc
    blog_section: "Operations support is where the gap is biggest"
    description: $lookup on the LOINC CodeSystem. The operation that fetches the display string for a coded value. Both fail, but for DIFFERENT reasons — that is the divergence the row demonstrates.
    path: CodeSystem/$lookup
    loadtest: "skip:unloaded_terminology"
    params:
      system: "http://loinc.org"
      code: "85354-9"
    expected_hapi:    "404 — OperationOutcome: Unable to find code (HAPI recognizes $lookup; LOINC content is not pre-loaded)"
    expected_aidbox:  "200 — but with an unusual body: {elements:null, values:null, total:0, entry:[]}. Aidbox appears to mis-route the request as a search, returning its internal empty-Bundle shape instead of a FHIR Parameters response."
    expected_medplum: "404 — OperationOutcome 'Not found' (plain 'not-found' code). Medplum doesn't implement $lookup; the URL is unrouted."
    expected_msfhir:  "400 — OperationOutcome 'Id must be any combination of upper or lower case ASCII letters...'. MS FHIR interprets $lookup as an invalid resource ID, not as an operation. Equivalent to GCP's 'invalid ID' rejection but with a less helpful error message."
    expected_blaze:   "400 — Blaze rejects the $lookup call with 400 (no terminology loaded), matching its $expand behavior — consistent client-error semantics"
    expected_spark:   "400 — Spark also returns 400. SIX SERVERS, FIVE STATUS CODES on this single query: HAPI 404, Aidbox 200 (mis-routed), Medplum 404, MS-FHIR 400, Blaze 400, Spark 400, GCP 400. The screenshot row of the post — terminology operations are the most divergent area in FHIR."

  - name: patient_revinclude_wildcard
    blog_section: "Search behavior diverges in ways you will not notice"
    description: Patient search with _revinclude=* (wildcard reverse-include). HAPI returns every resource that points at each patient. GCP rejects the wildcard.
    path: Patient
    loadtest: "skip:asymmetric_support"
    params:
      _count: "5"
      _revinclude: "*"
    expected_hapi:    "200 — Bundle with patients + everything that references them (often hundreds of entries)"
    expected_aidbox:  "500 — OperationOutcome fatal: 'Source is required for _revinclude parameter: <Source?>*'. Aidbox rejects with 500 — questionable status for a client error."
    expected_medplum: "400 — OperationOutcome 'is not supported as a value for search inclusion parameters'. Clean client-error rejection."
    expected_msfhir:  "200 — Bundle with 162 entries, matches HAPI. MS FHIR supports the wildcard."
    expected_blaze:   "200 — Bundle, 1 entry (Blaze supports _revinclude=* — joins HAPI + MS-FHIR in the accept-wildcard camp)"
    expected_spark:   "500 — Spark errored on the wildcard (joins Aidbox in the wrong-status-for-client-error camp). Now four camps clearly defined: ACCEPT (HAPI + MS-FHIR + Blaze), REJECT-CLIENT-ERROR (Medplum + GCP), REJECT-SERVER-ERROR (Aidbox + Spark)."

  - name: patient_export
    blog_section: "Bulk data support is uneven"
    description: Kick off a Patient-level $export (Bulk Data). Per the Bulk Data spec, a compliant server returns 202 Accepted with a Content-Location polling URL. Servers that don't implement Bulk Data return 400/404. This is a GET with the Prefer:respond-async header.
    path: Patient/$export
    loadtest: "skip:async_op"  # 202+poll pattern doesn't measure server work; behavior matrix only
    headers:
      Prefer: "respond-async"
      Accept: "application/fhir+json"
    expected_hapi:    "400 — OperationOutcome: 'does not know how to handle GET operation[Patient/$export]'. HAPI 8.x default config does NOT enable Bulk Data."
    expected_aidbox:  "500 — OperationOutcome fatal: 'storage-type not specified'. Aidbox supports Bulk Data but requires storage configured first."
    expected_medplum: "202 — Content-Location: /fhir/R4/bulkdata/export/<uuid>. Textbook Bulk Data Flow. Medplum supports $export out of the box."
    expected_msfhir:  "202 — Content-Location: /_operations/export/<id>. Textbook Bulk Data Flow response."
    expected_blaze:   "400 — Blaze does NOT ship with Bulk Data Export support out of the box (joins HAPI/Aidbox/GCP in the no-export-OOTB camp)"
    expected_spark:   "400 — Spark also lacks $export out of the box. Bulk Data ships out-of-the-box on only TWO of seven servers: Medplum + MS-FHIR. Five of seven require additional config or don't implement it."

  # ----------------------------------------------------------------------
  # Runtime-sampled search queries (load-only).
  #
  # These queries contain `{{placeholder}}` values resolved per-request
  # by loadtest/sample_pool.py, which harvests realistic parameter values
  # from the live server before the timed workload starts. They are
  # excluded from the behavior matrix (matrix: skip:runtime_sampled)
  # because compare.py has no stable expected_* to compare against once
  # values come from live data. Their job is to exercise the common
  # clinical-app search shapes — look up one patient, their observations,
  # conditions, encounters, and so on — against cache-miss-realistic
  # inputs, not a hot 5-patient set.
  # ----------------------------------------------------------------------

  - name: patient_read_by_id
    matrix: "skip:runtime_sampled"
    blog_section: "Search workload coverage"
    description: Random Patient read-by-id. Fresh id per request so the server can't cache a hot set; measures the real GET-by-id path including index lookup and cache-miss costs.
    path: "Patient/{{patient_id}}"
    sample:
      patient_id: patient_id

  - name: patient_by_family_exact
    matrix: "skip:runtime_sampled"
    blog_section: "Search workload coverage"
    description: Patient search by exact family name, sampled from live corpus surnames. More realistic than a single-letter prefix — measures the name index under the shapes real clinical apps use when looking up a known patient.
    path: Patient
    params:
      family: "{{family}}"
      _count: "5"
    sample:
      family: patient_family

  - name: observations_for_patient
    matrix: "skip:runtime_sampled"
    blog_section: "Search workload coverage"
    description: All Observations for a random patient — the single most common FHIR search in clinical UIs. Reference-param filter; exercises the Observation.subject/patient back-reference index.
    path: Observation
    params:
      patient: "Patient/{{patient_id}}"
      _count: "20"
    sample:
      patient_id: patient_id

  - name: conditions_for_patient
    matrix: "skip:runtime_sampled"
    blog_section: "Search workload coverage"
    description: Problem-list lookup — all Conditions for a random patient. Reference-param filter on Condition.subject/patient.
    path: Condition
    params:
      patient: "Patient/{{patient_id}}"
    sample:
      patient_id: patient_id

  - name: condition_by_code
    matrix: "skip:runtime_sampled"
    blog_section: "Search workload coverage"
    description: Condition search by SNOMED code, sampled from live corpus diagnoses. Token-index path on a different resource type than Observation — useful because Observation-by-code can dominate the aggregate otherwise.
    path: Condition
    params:
      code: "{{code}}"
      _count: "5"
    sample:
      code: condition_code

  - name: procedure_by_code
    matrix: "skip:runtime_sampled"
    blog_section: "Search workload coverage"
    description: Procedure search by SNOMED code, sampled from live corpus procedures. Another token-on-non-Observation path for search-by-code coverage.
    path: Procedure
    params:
      code: "{{code}}"
      _count: "5"
    sample:
      code: procedure_code

  - name: encounter_by_patient
    matrix: "skip:runtime_sampled"
    blog_section: "Search workload coverage"
    description: Visit history — all Encounters for a random patient. Reference-param filter on Encounter.subject/patient, which on some servers is a distinct index from Observation/Condition back-refs.
    path: Encounter
    params:
      patient: "Patient/{{patient_id}}"
      _count: "10"
    sample:
      patient_id: patient_id

  - name: medication_request_by_patient
    matrix: "skip:runtime_sampled"
    blog_section: "Search workload coverage"
    description: Medication list — all MedicationRequests for a random patient. Reference-param filter.
    path: MedicationRequest
    params:
      patient: "Patient/{{patient_id}}"
      _count: "10"
    sample:
      patient_id: patient_id

  - name: encounter_by_practitioner
    matrix: "skip:runtime_sampled"
    blog_section: "Search workload coverage"
    description: Encounters for a random Practitioner — "show me every visit this physician participated in." Exercises the participant reference index, which is structurally different from the patient back-ref and often uses a different index.
    path: Encounter
    params:
      participant: "Practitioner/{{practitioner_id}}"
      _count: "10"
    sample:
      practitioner_id: practitioner_id

  - name: encounter_by_location
